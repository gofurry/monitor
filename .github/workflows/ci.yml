name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache: true
      - run: test -z "$(gofmt -l .)"
      - run: go test ./...
      - run: go vet ./...
